# .github/workflows/feature-to-develop.yml
name: Feature → Develop PR

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: feature-to-develop-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check existing PR
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace("refs/heads/", "");

            const { data } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              base: "develop",
              head: `${context.repo.owner}:${branch}`
            });

            core.setOutput("exists", data.length > 0 ? "true" : "false");

      - name: Create PR
        if: steps.check.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace("refs/heads/", "");
            const featureName = branch.replace("feature/", "");

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Feature: ${featureName} → develop`,
              head: branch,
              base: "develop",
              body: "PR automático de feature branch para develop.",
              maintainer_can_modify: true
            });