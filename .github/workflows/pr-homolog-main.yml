name: Auto PR - Homolog to Main

on:
  push:
    branches:
      - homolog

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Pull Request to Main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --base main --head homolog --state open --json number --jq 'length')
          
          if [ "$PR_EXISTS" -eq 0 ]; then
            gh pr create \
              --base main \
              --head homolog \
              --title "Release: Homolog -> Main" \
              --body "PR automático para envio à produção."
            echo "PR criado com sucesso."
          else
            echo "PR de homolog para main já está aberto. Atualizado com os novos commits."
          fi