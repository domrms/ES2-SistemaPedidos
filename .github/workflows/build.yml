name: SonarQube

on:
  push:
    branches:
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: 17
          distribution: zulu

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/ES2-SistemaPedidos.FrontEnd/package-lock.json

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path ${{ runner.temp }}\scanner -Force
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      - name: Build and analyze
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |

          Push-Location src\ES2-SistemaPedidos.FrontEnd
          npm ci
          npm run build
          npm run test:coverage
          Pop-Location

          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin `
            /k:"domrms_es2-sistemapedidos" `
            /o:"domrms" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" `
            /d:sonar.exclusions=".github/workflows/**,database/**,docker/**,tests/e2e/**,tests/sast/**,src/ES2-SistemaPedidos.FrontEnd/node_modules/**,src/ES2-SistemaPedidos.FrontEnd/coverage/**,src/ES2-SistemaPedidos.FrontEnd/vitest.config.ts" `
            /d:sonar.test.inclusions="src/ES2-SistemaPedidos.FrontEnd/**/*.test.ts" `
            /d:sonar.coverage.exclusions="tests/unit/**,src/ES2-SistemaPedidos.FrontEnd/index.html,src/ES2-SistemaPedidos.FrontEnd/styles.css,src/ES2-SistemaPedidos.FrontEnd/script.js,src/ES2-SistemaPedidos.FrontEnd/**/*.test.ts" `
            /d:sonar.javascript.lcov.reportPaths="src/ES2-SistemaPedidos.FrontEnd/coverage/lcov.info" `
            /d:sonar.cs.opencover.reportsPaths="TestResults/**/coverage.opencover.xml" `
            /d:sonar.cs.vstest.reportsPaths="TestResults/**/*.trx"

          dotnet build

          $unitTestProjects = Get-ChildItem tests\unit -Recurse -Filter *.csproj

          foreach ($project in $unitTestProjects) {
            dotnet test $project.FullName `
              --no-build `
              --logger trx `
              --collect:"XPlat Code Coverage" `
              --results-directory TestResults `
              -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
          }

          ${{ runner.temp }}\scanner\dotnet-sonarscanner end `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}"