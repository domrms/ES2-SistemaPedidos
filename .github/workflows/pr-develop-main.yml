name: Auto PR - Develop to Main

on:
  push:
    branches:
      - develop

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Pull Request to Main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --base main --head develop --state open --json number --jq 'length')
          
          if [ "$PR_EXISTS" -eq 0 ]; then
            gh pr create \
              --base main \
              --head develop \
              --title "Release: Develop -> Main" \
              --body "PR automático para atualização do ambiente de produção."
            echo "PR criado com sucesso."
          else
            echo "PR de develop para main já está aberto. Atualizado com os novos commits."
          fi
