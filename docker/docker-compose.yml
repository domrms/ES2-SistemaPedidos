name: es2-sistema-pedidos

services:
  postgres:
    image: postgres:15-alpine
    container_name: es2-sistema-pedidos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: es2_pedidos
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/01-ddl.sql:/docker-entrypoint-initdb.d/01-ddl.sql:ro
      - ../database/02-dml.sql:/docker-entrypoint-initdb.d/02-dml.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d es2_pedidos"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - es2-sistema-pedidos

  database-init:
    image: postgres:15-alpine
    container_name: es2-sistema-pedidos-database-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: dev
    volumes:
      - ../database:/scripts:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        psql -h postgres -U dev -d es2_pedidos -v ON_ERROR_STOP=1 -f /scripts/01-ddl.sql;
        psql -h postgres -U dev -d es2_pedidos -v ON_ERROR_STOP=1 -f /scripts/02-dml.sql;
        echo 'Scripts DDL e DML executados.';
    networks:
      - es2-sistema-pedidos
    restart: "no"

  floci:
    image: floci/floci:latest
    container_name: es2-sistema-pedidos-floci
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      FLOCI_STORAGE_MODE: hybrid
      FLOCI_SERVICES_DOCKER_NETWORK: es2-sistema-pedidos
    networks:
      - es2-sistema-pedidos

  lambda-consumer-sqs-image:
    image: es2-sistema-pedidos-lambda-consumer-sqs:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.lambda
    container_name: es2-sistema-pedidos-lambda-consumer-sqs-image
    entrypoint: ["/bin/sh", "-c"]
    command: ["exit 0"]
    networks:
      - es2-sistema-pedidos

  aws-init:
    image: amazon/aws-cli:latest
    container_name: es2-sistema-pedidos-aws-init
    depends_on:
      floci:
        condition: service_started
      lambda-consumer-sqs-image:
        condition: service_completed_successfully
      persistencia-api:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://floci:4566
      LAMBDA_IMAGE: es2-sistema-pedidos-lambda-consumer-sqs:latest
    volumes:
      - ./aws:/scripts:ro
    command: ["sh /scripts/init-aws.sh"]
    networks:
      - es2-sistema-pedidos
    restart: "no"

  api:
    image: es2-sistema-pedidos-api:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: es2-sistema-pedidos-api
    depends_on:
      persistencia-api:
        condition: service_started
      aws-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS__Regiao: us-east-1
      AWS__ServiceUrl: http://floci:4566
      SQS_FILA_URL: http://floci:4566/000000000000/processamento-solicitacoes
      PersistenciaApi__UrlBase: http://persistencia-api:8080
      Cors__AllowedOrigins__0: http://localhost:8000
    networks:
      - es2-sistema-pedidos

  persistencia-api:
    image: es2-sistema-pedidos-persistencia-api:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.persistencia-api
    container_name: es2-sistema-pedidos-persistencia-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__BancoPedidos: Host=postgres;Port=5432;Database=es2_pedidos;Username=dev;Password=dev
      Cache__DuracaoSegundos: 300
    networks:
      - es2-sistema-pedidos

volumes:
  postgres_data:

networks:
  es2-sistema-pedidos:
    name: es2-sistema-pedidos
